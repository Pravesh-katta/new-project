apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-workflow-worker
  namespace: ai-workflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-workflow-worker
  template:
    metadata:
      labels:
        app: ai-workflow-worker
    spec:
      containers:
        - name: worker
          image: your-registry/ai-workflow-api:latest
          command: ["celery", "-A", "app.tasks.celery_app:celery_app", "worker", "-l", "info"]
          envFrom:
            - configMapRef:
                name: ai-workflow-config
            - secretRef:
                name: ai-workflow-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
