apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-workflow-config
  namespace: ai-workflow
data:
  APP_ENV: "prod"
  SQLALCHEMY_DATABASE_URL: "postgresql+psycopg2://app_user:app_password@postgres.ai-workflow.svc.cluster.local:5432/ai_workflow"
  REDIS_URL: "redis://redis.ai-workflow.svc.cluster.local:6379/0"
  S3_ENDPOINT_URL: "https://s3.amazonaws.com"
  S3_REGION: "us-east-1"
  S3_BUCKET: "documents-prod"
  OPENSEARCH_URL: "https://search-example-domain.us-east-1.es.amazonaws.com"
  OPENSEARCH_INDEX: "documents"
  CORS_ORIGINS: "https://app.example.com"
