apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-workflow-api
  namespace: ai-workflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-workflow-api
  template:
    metadata:
      labels:
        app: ai-workflow-api
    spec:
      containers:
        - name: api
          image: your-registry/ai-workflow-api:latest
          ports:
            - containerPort: 8101
          envFrom:
            - configMapRef:
                name: ai-workflow-config
            - secretRef:
                name: ai-workflow-secret
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8101
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8101
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
