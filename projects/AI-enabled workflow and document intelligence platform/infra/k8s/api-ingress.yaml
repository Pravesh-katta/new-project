apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-workflow-api-ingress
  namespace: ai-workflow
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: api.ai-workflow.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-workflow-api
                port:
                  number: 80
