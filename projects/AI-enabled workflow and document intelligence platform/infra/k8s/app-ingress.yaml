apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-workflow-app-ingress
  namespace: ai-workflow
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: app.ai-workflow.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ai-workflow-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-workflow-frontend
                port:
                  number: 80
