services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ai-workflow-frontend
    ports:
      - "3101:80"
    depends_on:
      - api

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ai-workflow-api
    env_file:
      - .env
    ports:
      - "8101:8101"
    volumes:
      - ../backend/app:/app/app
      - ../backend/data:/app/data
    depends_on:
      - postgres
      - redis
      - opensearch
      - minio
      - minio-setup

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ai-workflow-worker
    command: celery -A app.tasks.celery_app:celery_app worker -l info
    env_file:
      - .env
    volumes:
      - ../backend/app:/app/app
      - ../backend/data:/app/data
    depends_on:
      - postgres
      - redis
      - opensearch
      - minio
      - minio-setup

  postgres:
    image: postgres:16-alpine
    container_name: ai-workflow-postgres
    environment:
      POSTGRES_DB: ai_workflow
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-workflow-redis
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: ai-workflow-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: ai-workflow-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-setup:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    container_name: ai-workflow-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb -p local/documents || true;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
